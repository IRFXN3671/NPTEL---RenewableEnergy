<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Information Retrieval Quiz | 125 Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f1f5f9 0%, #e6edf4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        /* Main container */
        .quiz-container {
            max-width: 950px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }

        /* Header */
        .quiz-header {
            background: #0f172a;
            padding: 1.5rem 2rem;
            color: white;
        }
        .quiz-header h1 {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .quiz-header p {
            color: #a5b4fc;
            margin-top: 6px;
            font-size: 0.9rem;
        }

        /* main content */
        .quiz-main {
            padding: 2rem 2rem 2rem 2rem;
        }

        /* mode selection screen */
        .mode-screen, .chapter-screen, .quiz-screen, .result-screen {
            transition: 0.2s;
        }

        .btn-group {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin: 1.8rem 0 1rem;
        }

        .btn {
            border: none;
            background: #f1f5f9;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-primary {
            background: #2c3e66;
            color: white;
            box-shadow: 0 4px 10px rgba(44,62,102,0.3);
        }
        .btn-primary:hover {
            background: #1e2a4a;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #cbd5e1;
        }
        .btn-outline:hover {
            background: #eef2ff;
            border-color: #2c3e66;
        }
        .btn-secondary {
            background: #475569;
            color: white;
        }
        .btn-secondary:hover {
            background: #334155;
        }

        .chapter-select {
            margin: 1.5rem 0;
        }
        select {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 1.2rem;
            border: 1.5px solid #cbd5e1;
            background: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        .question-card {
            margin-bottom: 2rem;
        }
        .question-text {
            font-size: 1.45rem;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            background: #f8fafc;
            padding: 1rem 1.2rem;
            border-radius: 1.2rem;
            border-left: 5px solid #2c3e66;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: #ffffff;
            padding: 0.9rem 1.2rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            transition: 0.1s;
        }
        .option-item:hover {
            background: #fef9e3;
            border-color: #facc15;
        }
        input[type="radio"], input[type="checkbox"] {
            margin-top: 3px;
            width: 1.2rem;
            height: 1.2rem;
            accent-color: #2c3e66;
            cursor: pointer;
        }
        .option-label {
            font-size: 1rem;
            line-height: 1.4;
            color: #1e293b;
            cursor: pointer;
        }

        .feedback {
            padding: 0.9rem;
            border-radius: 1rem;
            margin: 1rem 0;
            font-weight: 500;
            background: #f1f5f9;
        }
        .feedback.correct {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        .feedback.incorrect {
            background: #ffe4e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            gap: 1rem;
        }
        .score-badge {
            background: #eef2ff;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1rem;
        }
        hr {
            margin: 1rem 0;
        }
        .footer-msg {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 2rem;
            color: #475569;
        }
        @media (max-width: 640px) {
            .quiz-main { padding: 1.5rem; }
            .question-text { font-size: 1.2rem; }
        }
        .hidden {
            display: none;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="quiz-container" id="appRoot">
    <div class="quiz-header">
        <h1>📚 IR Quiz Bank</h1>
        <p>125 questions • Information Retrieval (NPTEL style) • Chapterwise / All-in-one</p>
    </div>
    <div class="quiz-main" id="mainContent">
        <!-- dynamic views injected here -->
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // ************** MASTER QUESTION BANK (125 Questions) **********
    // Hardcoded from assignments Week 1 to Week 12 (Week10 has 15)
    // Each question: text, options[], correctIndices[], isMulti bool
    // Data derived from provided PDF + accepted answers.
    // --------------------------------------------------------------

    const QUESTIONS_DB = [];

    // Helper to add question
    function addQuestion(week, qText, optionsArr, correctIdxArr, isMulti = false) {
        QUESTIONS_DB.push({
            id: QUESTIONS_DB.length + 1,
            week: week,
            text: qText,
            options: optionsArr,
            correctIndices: correctIdxArr,
            isMulti: isMulti
        });
    }

    // ========================= WEEK 1 =========================
    addQuestion(1, "What is the primary goal of Information Retrieval (IR)?",
        ["To structure databases", "To seek out unstructured documents that satisfy a user's information need", "To perform numerical computations", "To design user interfaces"], [1], false);
    addQuestion(1, "What does the term stopword refer to in IR?",
        ["Words that are rare in documents", "Words that are always capitalized", "Technical terms in a document", "Commonly used words that do not contribute significantly to content understanding"], [3], false);
    addQuestion(1, "What is the main difference between controlled vocabulary and free-text vocabulary? (Select all that apply)",
        ["Controlled vocabulary uses human-assigned topics; free-text uses terms from the document", "Controlled vocabulary is cheaper to implement", "Free-text vocabulary is more ambiguous", "Controlled vocabulary has predefined terms; free-text vocabulary is more flexible and allows any terms."], [0,2,3], true);
    addQuestion(1, "In query optimization for Boolean retrieval, the best practice is to process terms:",
        ["In alphabetical order", "In order of increasing document frequency", "In order of decreasing document frequency", "Randomly"], [1], false);
    addQuestion(1, "A key disadvantage of controlled vocabulary is:",
        ["Too many terms", "Cannot be used for indexing", "Expensive and time-consuming", "Cannot represent topic details"], [2], false);
    addQuestion(1, "Ad hoc IR means:",
        ["Using SQL to retrieve documents", "Retrieval done with unlimited queries", "Retrieval evaluated using a finite set of queries", "No evaluation is needed"], [2], false);
    addQuestion(1, "What is a major drawback of using grep-like linear scanning for IR on large collections?",
        ["It cannot handle Boolean queries", "It is efficient for ranked retrieval", "It supports proximity queries well", "It requires scanning the entire collection for each query term"], [3], false);
    addQuestion(1, "Which of the following are stored in the dictionary of an inverted index?",
        ["The actual term", "Document frequency", "Position of term in each document", "Pointer to the start of the posting list"], [0,1,3], true);
    addQuestion(1, "You have two posting lists: T1=[3,10,24,40], T2=[1,10,15,24,35,40]. How many comparisons occur during a standard AND merge?",
        ["6", "7", "8", "9"], [1], false);
    addQuestion(1, "Let us assume two posting list sizes |A| = 1200 and |B| = 300. Then what will be the size of A AND B?",
        ["36", "1200", "300", "90"], [2], false);

    // ========================= WEEK 2 =========================
    addQuestion(2, "What is document frequency?",
        ["Number of times a term occurs in a document", "Number of documents containing the term", "Total occurrences of a term in the corpus", "Number of tokens in a document"], [1], false);
    addQuestion(2, "Posting lists may store: (Select all that apply)",
        ["DocIDs", "Document lengths", "Term frequencies", "Term positions"], [0,2,3], true);
    addQuestion(2, "Zipf's law relates:",
        ["Term frequency vs document length", "Document rank vs popularity", "Posting length vs dictionary size", "Term rank vs frequency"], [3], false);
    addQuestion(2, "Heaps' law predicts:",
        ["Vocabulary size as a function of corpus size", "Posting list compression ratio", "Query popularity distribution", "Document frequency growth"], [0], false);
    addQuestion(2, "Which dictionary implementation supports prefix/wildcard queries efficiently?",
        ["Hash-based dictionary", "SPIMI dictionary", "Sort-based dictionary", "Binary heap dictionary"], [2], false);
    addQuestion(2, "SPIMI does not require sorting because:",
        ["It never stores docIDs", "It merges lists during query time", "It stores tokens unsorted permanently", "It keeps posting lists in hash tables directly"], [3], false);
    addQuestion(2, "Which of the following are implications of Zipf's law? (Select all)",
        ["Most words occur rarely", "A few words dominate the corpus", "Word frequency follows a power law", "All terms have equal frequency"], [0,1,2], true);
    addQuestion(2, "Why do we use tree-based dictionary structures (B-trees) in IR? (Select all)",
        ["Need for range/prefix queries", "Need for dynamic updates", "Need for faster lookups", "Simpler to implement"], [0,1], true);
    addQuestion(2, "What is the primary advantage of storing gaps (differences) in posting lists?",
        ["Gaps are always smaller numbers, requiring fewer bits to encode.", "Gaps eliminate the need for a dictionary.", "Gaps allow for lossy compression of the index.", "Gaps make range queries faster."], [0], false);
    addQuestion(2, "According to Zipf's Law with constant c=0.1, approximately what percentage of the text do the top 10 most frequent terms account for?",
        ["10%", "20%", "30%", "40%"], [2], false);

    // ========================= WEEK 3 =========================
    addQuestion(3, "What is the role of an Analyzer during indexing?",
        ["It computes relevance scores", "It tokenizes and processes text", "It stores fields on disk", "It merges index segments"], [1], false);
    addQuestion(3, "In Lucene, a Document is best described as:",
        ["A single term in the vocabulary", "A query representation", "A container for multiple fields", "A scoring function"], [2], false);
    addQuestion(3, "When adding a Field to a Document, which are legitimate concerns? (Select all)",
        ["Stored: Should the original value be saved so it can be retrieved later?", "Indexed: Should the value be processed so it can be searched?", "Tokenized: If indexed, should the text be broken into individual keywords?", "Typed: Is the value a string, integer, or date?"], [0,1,2], true);
    addQuestion(3, "For the 'CONTENT' field to support phrase queries, which IndexOptions setting provides the necessary data?",
        ["TextField", "IndexOptions.DOCS", "IndexOptions.DOCS_AND_FREQS", "IndexOptions.DOCS_AND_FREQS_AND_POSITIONS"], [3], false);
    addQuestion(3, "Which steps are correct in the main indexing workflow (PyLucene)? (Select all)",
        ["Use lucene.initVM() at the very start", "For each document, create a new IndexWriter instance", "Use writer.addDocument(doc) to add each document", "Finally close IndexWriter with writer.close()"], [0,2,3], true);
    addQuestion(3, "Which design choices help in efficient indexing? (Select all)",
        ["Not storing large text fields", "Using StringField for categorical data", "Tokenizing numeric fields", "Choosing appropriate analyzers"], [0,1,3], true);
    addQuestion(3, "Which statements about Lucene Documents are correct? (Select all)",
        ["A document can have multiple fields with the same name", "Field names must be unique per document", "Documents are immutable once indexed", "Documents directly store posting lists"], [0,2], true);
    addQuestion(3, "Why is it usually inefficient to store large text fields in Lucene?",
        ["Stored fields affect term statistics", "Stored fields increase index size", "Stored fields reduce recall", "Stored fields cannot be compressed"], [1], false);
    addQuestion(3, "Which Lucene field type is most appropriate for document identifiers?",
        ["TextField", "StoredField", "StringField", "IntPoint"], [2], false);
    addQuestion(3, "For ISBN (exact lookup, never display) and DESCRIPTION (full-text search, display original): best pair?",
        ["ISBN: TextField (stored=False), Description: StringField", "ISBN: StringField (stored=False), Description: TextField (stored=True)", "ISBN: StringField (stored=True), Description: StringField (stored=True)", "ISBN: TextField (stored=True), Description: TextField (stored=True)"], [1], false);

    // ========================= WEEK 4 =========================
    addQuestion(4, "What does field-specific boosting allow in Lucene?",
        ["Avoids stopword removal", "Eliminates need for analyzers", "Enables field-specific boosting", "Increases indexing speed"], [2], false);
    addQuestion(4, "Without field normalization, what is the likely effect when a document has a long body and short title?",
        ["Title dominates scoring", "Body dominates scoring", "Both contribute equally", "Document is ignored"], [1], false);
    addQuestion(4, "How does maxDoc() differ from numDocs()?",
        ["maxDoc() excludes deleted docs", "numDocs() includes deleted docs", "maxDoc() includes deleted docs", "They are always equal"], [2], false);
    addQuestion(4, "Why might two indexes built from the same corpus appear different in Lucene? (Select all)",
        ["Different analyzers used", "Different field storage settings", "Different indexing time", "Different OS"], [0,1], true);
    addQuestion(4, "What additional information is needed to handle proximity query like (information UN/3 science)?",
        ["Term frequencies", "Document IDs", "Term positions", "Field mappings"], [2], false);
    addQuestion(4, "What is a key limitation of basic Boolean retrieval (AND, OR, NOT)?",
        ["It cannot handle wildcards", "It does not support ranking", "It cannot process non-English text", "It requires too much memory"], [1], false);
    addQuestion(4, "What does the query (information OW/2 science) require for a match?",
        ["information must appear exactly 2 words before science", "information must appear within 2 words before science", "information and science must be in the same document", "information must appear after science"], [1], false);
    addQuestion(4, "If English and German documents are indexed using the same EnglishAnalyzer, what is the most likely consequence?",
        ["German stopwords will be preserved", "German words may be incorrectly stemmed or removed", "Queries will fail to parse", "Index will not build"], [1], false);
    addQuestion(4, "Which of the following is a benefit of using document/field boosting?",
        ["Increases index size", "Improves relevance by emphasizing certain fields", "Removes stopwords automatically", "Disables scoring"], [1], false);
    addQuestion(4, "What does IndexWriter's commit() ensure?",
        ["Flushes the index to disk and makes changes visible", "Deletes all documents", "Rebuilds the dictionary", "Disables caching"], [0], false);

    // ========================= WEEK 5 =========================
    addQuestion(5, "Limitations of Boolean retrieval? (Select all)",
        ["No ranking of results", "Hard for non-expert users", "Cannot handle free-text queries", "Returns too many or too few matched documents"], [0,1,3], true);
    addQuestion(5, "Jaccard(D,Q) for D:(apple,pie,recipe,sugar,flour) Q:(apple,pie,recipe)",
        ["0.6", "0.67", "0.75", "1.0"], [0], false);
    addQuestion(5, "Which factors are ignored by Jaccard similarity? (Select all)",
        ["Term frequency", "Term importance", "Unique word overlap", "Exact word ordering"], [0,1,3], true);
    addQuestion(5, "N=1000, df('term')=10. Compute idf (log10).",
        ["1", "2", "3", "4"], [1], false);
    addQuestion(5, "Why is inner product similarity biased?",
        ["It ignores rare terms", "It favors documents with more unique terms", "It favors longer documents", "It penalizes frequent terms"], [2], false);
    addQuestion(5, "Cosine similarity between Q=(1,1,0) and D=(2,2,0):",
        ["0", "0.5", "1", "2"], [2], false);
    addQuestion(5, "tf=4, N=1000, df=100. TF=1+log10(tf), IDF=log10(N/df). Length-normalized TF-IDF?",
        ["0.008", "0.1", "1.92", "0.81", "1.60"], [4], false);
    addQuestion(5, "Which of the following best defines recall?",
        ["Fraction of retrieved documents that are relevant", "Fraction of relevant documents that are retrieved", "Harmonic mean of precision and recall", "Fraction of documents classified correctly"], [1], false);
    addQuestion(5, "A metric heavily affected by class imbalance in IR:",
        ["Precision", "Recall", "Accuracy", "F1-score"], [2], false);
    addQuestion(5, "Given 10 relevant docs, system retrieves ranked list with relevant at ranks 1,5,8. Non-interpolated AP approx?",
        ["0.18", "0.25", "0.36", "0.60"], [0], false);

    // ========================= WEEK 6 =========================
    addQuestion(6, "In BM25, if b=0, what happens to document length normalization?",
        ["It is fully applied", "It is partially applied", "It is not applied", "It is inverted"], [2], false);
    addQuestion(6, "Why is IDF always finite for a term in the collection?",
        ["Because collection size is finite", "Because term frequency is always >0", "Because log of zero is undefined", "Because df ≥ 1 for terms in the collection"], [3], false);
    addQuestion(6, "Increasing weight of TITLE field in fielded retrieval will:",
        ["Penalize long documents", "Increase importance of matches in TITLE", "Reduce IDF values", "Eliminate BODY matches"], [1], false);
    addQuestion(6, "BM25 TF component: doc length 120, avgdl=100, b=0.75, k1=1.2, tf=8. Approx value?",
        ["1.88", "2.78", "3.45", "4.32"], [0], false);
    addQuestion(6, "Valid design choices in field-based retrieval: (Select all)",
        ["Different weights for TITLE, ABSTRACT, BODY", "Same match function for all zones (mandatory)", "Different match functions for different fields", "Ignoring BODY completely"], [0,2], true);
    addQuestion(6, "N=1,000,000, df=1000. IDF (log10)?",
        ["1", "2", "3", "6"], [2], false);
    addQuestion(6, "In SMART notation Inc.ltn which components apply to query?",
        ["Log TF", "IDF", "Cosine normalization", "Binary TF"], [0,1], true);
    addQuestion(6, "Probability Ranking Principle (PRP) states:",
        ["Rank documents by decreasing TF-IDF", "Rank documents by decreasing probability of relevance", "Classify into relevant/non-relevant", "Use Boolean retrieval"], [1], false);
    addQuestion(6, "BIM weight log((N-df)/df) is closely related to:",
        ["TF", "Cosine similarity", "IDF", "Document length normalization"], [2], false);
    addQuestion(6, "Two terms df1=100, df2=10000, N=1e6, BIM sum for doc containing both?",
        ["~7.98", "~5.99", "~4.97", "~3.98"], [1], false);

    // ========================= WEEK 7 ========================= (Language Models)
    addQuestion(7, "What is a Language Model in IR context?",
        ["A model that translates between languages", "A probability distribution over sequences of words", "A grammar checker", "Neural network for classification"], [1], false);
    addQuestion(7, "What problem does smoothing solve in LMs?",
        ["Overfitting to training data", "Zero probability for unseen words", "Slow computation", "High memory usage"], [1], false);
    addQuestion(7, "Which smoothing method uses a fixed λ for all documents?",
        ["Jelinek-Mercer smoothing", "Dirichlet smoothing", "Laplace smoothing", "Absolute discounting"], [0], false);
    addQuestion(7, "MLE P('AI'|D) if |D|=100 and 'AI' occurs 5 times?",
        ["0.05", "0.5", "0.005", "0.0005"], [0], false);
    addQuestion(7, "If a query term is missing from a document, without smoothing P(Q|D) becomes:",
        ["0", "1", "0.5", "Undefined"], [0], false);
    addQuestion(7, "λ=0.7, P(t|D)=0.2, P(t|C)=0.02. Smoothed P(t|D)=?",
        ["0.066", "0.074", "0.168", "0.146"], [3], false);
    // Questions 7-10 from collection (docs1-4). Ranking for 'shears' -> doc4,1,2,3. Click -> 2,1,4,3. etc.
    addQuestion(7, "Ranking of documents for query 'shears' (mixture model 0.5/0.5):",
        ["1,4,2,3", "4,1,2,3", "3,1,2,4", "4,2,1,3"], [1], false);
    addQuestion(7, "Ranking for query 'click':",
        ["2,1,3,4", "1,4,2,3", "2,3,4,1", "2,1,4,3"], [3], false);
    addQuestion(7, "Ranking for query 'click shears':",
        ["4,1,2,3", "1,4,3,2", "4,2,1,3", "4,1,3,2"], [0], false);
    addQuestion(7, "Score of document 3 for query 'click shears' under smoothing:",
        ["It becomes 0", "It is positive but small", "Exactly 0.25", "Exactly 0.5"], [1], false);

    // ========================= WEEK 8 =========================
    addQuestion(8, "What does KL Divergence measure between two probability distributions?",
        ["Euclidean distance", "Cosine similarity", "Information loss", "Correlation coefficient"], [2], false);
    addQuestion(8, "Property of KL Divergence?",
        ["Symmetric", "Always equals 1", "Non-negative", "Follows triangle inequality"], [2], false);
    addQuestion(8, "Lucene query class for exact matching of a single term:",
        ["PhraseQuery", "TermQuery", "BooleanQuery", "WildcardQuery"], [1], false);
    addQuestion(8, "Which are true about KL Divergence? (Select all)",
        ["KL(P||Q) = KL(Q||P)", "KL(P||Q)=0 if P=Q", "Documents arranged in decreasing KL(D||Query)", "KL is always positive"], [1], true);
    addQuestion(8, "Key difference between TermQuery and QueryParser:",
        ["TermQuery uses analyzer, QueryParser does not", "QueryParser is case-sensitive", "TermQuery matches exact stored terms, QueryParser applies analysis", "QueryParser only works with StringField"], [2], false);
    addQuestion(8, "If JSD(P||Q)=0, what can be concluded?",
        ["P and Q are identical", "P and Q orthogonal", "KL(P||Q)=1", "KL(Q||P)=0.5"], [0], false);
    addQuestion(8, "Range of Jensen-Shannon Divergence:",
        ["0 to 1", "-1 to 1", "0 to ∞", "Depends on distributions"], [0], false);
    addQuestion(8, "If field indexed as StringField, which query method is more appropriate?",
        ["QueryParser", "TermQuery", "PhraseQuery", "FuzzyQuery"], [1], false);
    addQuestion(8, "Using a different analyzer during search than indexing leads to:",
        ["No matches", "Slower search", "Results inaccurate or empty", "Index rebuilt"], [2], false);
    addQuestion(8, "Large KL(P||Q) value indicates:",
        ["P and Q similar", "Using Q to approximate P results in high information loss", "P has higher entropy", "Q is good model for P"], [1], false);

    // ========================= WEEK 9 ========================= (Evaluation)
    addQuestion(9, "Best description of Recall:",
        ["Fraction of retrieved that are relevant", "Fraction of relevant that are retrieved", "Fraction classified correctly", "Harmonic mean of P/R"], [1], false);
    addQuestion(9, "Metric most affected by class imbalance:",
        ["Precision", "Recall", "Accuracy", "F1-score"], [2], false);
    addQuestion(9, "Cranfield paradigm assumptions: (Select all)",
        ["Relevance can be objectively determined", "All relevant documents are known", "Relevance depends on document rank", "All relevant documents contribute equally"], [0,1,3], true);
    addQuestion(9, "Two systems have same P,R,F1 but one better ranking. Which metric distinguishes?",
        ["Accuracy", "P@K", "R-Precision", "Average Precision"], [3], false);
    addQuestion(9, "Non-interpolated AP for relevant at ranks 1,5,8 (10 total relevant): approx?",
        ["0.18", "0.25", "0.36", "0.60"], [0], false);
    addQuestion(9, "DCG@5 with gains [1,1,3,0,1] discount 1/log2(i+1):",
        ["3.51", "3.98", "4.32", "5.04"], [2], false);
    addQuestion(9, "nDCG@5 gains [3,2,0,3,1] ideal sorted [3,3,2,1,0]?",
        ["0.71", "0.80", "0.89", "0.98"], [2], false);
    addQuestion(9, "Which metric best matches scenarios? (Known-item -> MRR, Web search -> nDCG, Early prototype -> P@K)",
        ["All correct match", "MRR for web", "nDCG for known-item", "None"], [0], false);
    addQuestion(9, "MRR for first relevant ranks [3,1,5,2]:",
        ["0.46", "0.50", "0.58", "0.64"], [1], false);
    addQuestion(9, "Cohen's κ=0.72 indicates agreement:",
        ["Poor", "Fair", "Good", "Perfect"], [2], false);

    // ========================= WEEK 10 (15 questions) =========================
    addQuestion(10, "In Relevance Model 1 (RM1), expansion terms derived from:",
        ["User click logs", "Document frequency in corpus", "Top retrieved documents weighted by query likelihood", "Pretrained embeddings"], [2], false);
    addQuestion(10, "Advantage of RM3 over RM1:",
        ["Reduces query drift by retaining original query terms", "Less computation", "Doesn't need smoothing", "Always improves recall"], [0], false);
    addQuestion(10, "In TREC Eval, qrels file contains:",
        ["Ranked list", "Query descriptions", "Ground truth relevance judgments", "Index statistics"], [2], false);
    addQuestion(10, "tree_eval option for per-query results:",
        ["-m all_trec", "-q", "-m map", "-m P.10"], [1], false);
    addQuestion(10, "If 10 relevant docs, system retrieves 4 relevant in top10: P@10?",
        ["0.10", "0.25", "0.40", "0.60"], [2], false);
    addQuestion(10, "RM1: P(algorithm|R) from given docs (0.2,0.4,0.2) query scores? approx value:",
        ["0.03", "4.65", "1.82", "1.07"], [3], false);
    addQuestion(10, "RM3 with α=0.6, original P(algorithm|Q)=0, final probability?",
        ["7.28", "4.82", "4.28", "6.42"], [2], false);
    addQuestion(10, "How many total relevant documents for 50 queries (FIRE qrel)?",
        ["2857", "3076", "3539", "3607"], [2], false);
    addQuestion(10, "Query with highest number of relevant docs?",
        ["204", "189", "192", "224"], [0], false);
    addQuestion(10, "Query with least relevant documents?",
        ["208", "187", "194", "223"], [1], false);
    addQuestion(10, "MAP with Dirichlet smoothing (mu=500) approx?",
        ["0.30", "0.28", "0.36", "0.40"], [2], false);
    addQuestion(10, "Precision at rank 5 for query 2007 approx?",
        ["0.1", "0.2", "0.3", "0.4"], [3], false);
    addQuestion(10, "BM25 (k1=1,b=0.5) overall recall approx?",
        ["0.6", "0.7", "0.8", "0.9"], [2], false);
    addQuestion(10, "BM25 with default parameters MAP approx (FIRE dataset)?",
        ["0.32", "0.35", "0.38", "0.41"], [1], false);
    addQuestion(10, "nDCG@10 for best run approx?",
        ["0.52", "0.58", "0.63", "0.68"], [2], false);

    // ========================= WEEK 11 ========================= (PageRank, HITS)
    addQuestion(11, "In PageRank, damping factor (d) typically represents:",
        ["Probability of stopping algorithm", "Probability of jumping to a random page", "Number of inbound links", "Number of outbound links"], [1], false);
    addQuestion(11, "White Hat SEO refers to:",
        ["Unethical techniques", "Following search engine guidelines, user experience", "Buying links", "Ignoring mobile optimization"], [1], false);
    addQuestion(11, "Inbound link contributes more when it comes from:",
        ["A page with high PageRank", "A page with many outbound links", "A newly crawled page", "A page with fewer terms"], [0], false);
    addQuestion(11, "Damping factor d=0.85, fraction of rank mass from teleportation:",
        ["0.15", "0.85", "1/N", "0"], [0], false);
    addQuestion(11, "Which matrix property required for PageRank convergence?",
        ["Symmetry", "Diagonal dominance", "Stochasticity", "Orthogonality"], [2], false);
    addQuestion(11, "Normalized authority score of node C after first iteration (graph):",
        ["1/12", "1/15", "5/12", "5/15"], [0], false);
    addQuestion(11, "Normalized hub score of node E after first iteration:",
        ["4/15", "4/12", "1/12", "1/15"], [0], false);
    addQuestion(11, "Normalized authority score of node G after second iteration:",
        ["2/15", "4/15", "0", "2/12"], [2], false);
    addQuestion(11, "Normalized hub score of node A after second iteration:",
        ["2/15", "1/15", "2/45", "4/45"], [1], false);
    addQuestion(11, "Normalized authority score of node C after second iteration:",
        ["12/35", "1/7", "4/35", "1/15"], [0], false);

    // ========================= WEEK 12 =========================
    addQuestion(12, "Best defines Learning to Rank (LTR):",
        ["Rule-based ranking", "Probabilistic retrieval", "ML approach to learn ranking functions from data", "Query expansion"], [2], false);
    addQuestion(12, "Key innovation of RoBERTa over BERT:",
        ["More attention heads", "Removing Next Sentence Prediction", "Using CNN layers", "Reinforcement learning"], [1], false);
    addQuestion(12, "Term-document matrix 1000x500, rank 200, choose k=50 for SVD. Size of U_k?",
        ["1000x50", "50x500", "1000x200", "200x50"], [0], false);
    addQuestion(12, "True about Sentence-BERT: (Select all)",
        ["Encodes queries and documents separately", "Uses cross-encoder architecture", "Designed for efficient semantic search", "Processes query and document together"], [0,2], true);
    addQuestion(12, "LambdaRank improves RankNet by:",
        ["Gradient boosting", "Scaling gradients by NDCG gain", "More hidden layers", "Listwise loss"], [1], false);
    addQuestion(12, "Why assign lower weights to expansion terms than original query?",
        ["Save memory", "Reduce influence of less certain terms", "Expansion terms always irrelevant", "Avoid embeddings"], [1], false);
    addQuestion(12, "In LSI, reduced-rank approximation Ak minimizes:",
        ["KL-divergence", "Cosine similarity loss", "Frobenius norm of A - Ak", "Determinant of covariance"], [2], false);
    addQuestion(12, "Practical IR system using LSI:",
        ["Replace original scores with LSI", "Use LSI only for query expansion", "Linearly combine original scores with LSI scores", "LSI only for indexing"], [2], false);
    addQuestion(12, "Limitations of static embeddings include:",
        ["Same vector for polysemous words", "Inability to capture context", "High dimensionality", "Slow training time"], [0,1], true);
    addQuestion(12, "Embedding method best for phrase-level semantics for query expansion:",
        ["Word2Vec", "GloVe", "FastText", "BERT sentence embeddings"], [3], false);

    // Validate total count: should be 125
    console.log("Total questions loaded:", QUESTIONS_DB.length);

    // ---------- QUIZ CONTROLLER ----------
    let currentMode = null; // 'chapter' or 'all'
    let activeQuestions = [];     // array of question objects for current quiz
    let currentIndex = 0;
    let userScore = 0;
    let userAnswers = []; // store selected indices (array for each question)
    let quizActive = false;
    let currentFeedback = null;

    const app = document.getElementById("mainContent");

    function renderModeSelection() {
        app.innerHTML = `
            <div class="mode-screen">
                <h3 style="margin-bottom: 0.5rem;">📖 Choose Quiz Mode</h3>
                <p style="margin-bottom: 1.2rem; color: #334155;">Select how you want to attempt the 125 questions</p>
                <div class="btn-group">
                    <button class="btn btn-primary" id="modeChapterBtn">📚 Chapterwise Quiz</button>
                    <button class="btn btn-primary" id="modeAllBtn">🎯 All 125 Questions (Sequential)</button>
                </div>
                <div class="footer-msg">✅ Questions include single & multi-select (checkboxes).</div>
            </div>
        `;
        document.getElementById("modeChapterBtn")?.addEventListener("click", () => showChapterSelection());
        document.getElementById("modeAllBtn")?.addEventListener("click", () => startAllQuiz());
    }

    function showChapterSelection() {
        app.innerHTML = `
            <div class="chapter-screen">
                <h3>📑 Select Chapter (Week 1 - 12)</h3>
                <div class="chapter-select">
                    <select id="chapterSelect">
                        ${Array.from({length:12}, (_,i)=> `<option value="${i+1}">Week ${i+1} (${QUESTIONS_DB.filter(q=>q.week===i+1).length} questions)</option>`).join('')}
                    </select>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="startChapterBtn">Start Chapter Quiz</button>
                    <button class="btn btn-outline" id="backModeBtn">← Back</button>
                </div>
            </div>
        `;
        document.getElementById("startChapterBtn")?.addEventListener("click", () => {
            const weekVal = parseInt(document.getElementById("chapterSelect").value);
            const filtered = QUESTIONS_DB.filter(q => q.week === weekVal);
            if(filtered.length) startQuiz(filtered);
            else alert("No questions for this week");
        });
        document.getElementById("backModeBtn")?.addEventListener("click", () => renderModeSelection());
    }

    function startAllQuiz() {
        startQuiz([...QUESTIONS_DB]);
    }

    function startQuiz(questionsArr) {
        activeQuestions = questionsArr;
        currentIndex = 0;
        userScore = 0;
        userAnswers = new Array(activeQuestions.length).fill(null);
        quizActive = true;
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        if(!quizActive || currentIndex >= activeQuestions.length) {
            showFinalResult();
            return;
        }
        const q = activeQuestions[currentIndex];
        const isMulti = q.isMulti;
        const saved = userAnswers[currentIndex];
        const selectedSet = saved ? new Set(saved) : new Set();
        const optionsHtml = q.options.map((opt, idx) => {
            const inputType = isMulti ? 'checkbox' : 'radio';
            const nameAttr = isMulti ? `q${currentIndex}` : `qradio${currentIndex}`;
            const checked = selectedSet.has(idx) ? 'checked' : '';
            return `
                <div class="option-item" data-opt-index="${idx}">
                    <input type="${inputType}" name="${nameAttr}" value="${idx}" id="opt_${idx}" ${checked}>
                    <label class="option-label" for="opt_${idx}">${escapeHtml(opt)}</label>
                </div>
            `;
        }).join('');
        const feedbackHtml = currentFeedback ? `<div class="feedback ${currentFeedback.correct ? 'correct' : 'incorrect'}">${currentFeedback.message}</div>` : '';
        app.innerHTML = `
            <div class="quiz-screen">
                <div class="score-badge">📊 Score: ${userScore} / ${currentIndex}</div>
                <div class="question-card">
                    <div class="question-text">Q${currentIndex+1}. ${escapeHtml(q.text)} ${isMulti ? ' (Select all that apply)' : ''}</div>
                    <div class="options-list" id="optionsContainer">
                        ${optionsHtml}
                    </div>
                    ${feedbackHtml}
                    <div class="nav-buttons">
                        <button class="btn btn-outline" id="submitAnswerBtn">✓ Submit Answer</button>
                        <button class="btn btn-secondary" id="nextBtn" disabled>Next →</button>
                    </div>
                    <div style="margin-top:1rem;"><button class="btn btn-outline" id="resetQuizBtn">⟳ Exit Quiz</button></div>
                </div>
            </div>
        `;
        document.getElementById("submitAnswerBtn")?.addEventListener("click", () => handleSubmit());
        document.getElementById("nextBtn")?.addEventListener("click", () => goNext());
        document.getElementById("resetQuizBtn")?.addEventListener("click", () => { quizActive=false; renderModeSelection(); });
        attachOptionListeners();
    }

    function attachOptionListeners() { /* event listeners for ui, but we rely on submit reading dom */ }

    function handleSubmit() {
        const q = activeQuestions[currentIndex];
        const isMulti = q.isMulti;
        let selected = [];
        if(isMulti) {
            const checkboxes = document.querySelectorAll(`input[type="checkbox"]`);
            checkboxes.forEach(cb => { if(cb.checked) selected.push(parseInt(cb.value)); });
        } else {
            const radioSelected = document.querySelector(`input[type="radio"]:checked`);
            if(radioSelected) selected = [parseInt(radioSelected.value)];
        }
        const correctSet = new Set(q.correctIndices);
        const isCorrect = (selected.length === q.correctIndices.length) && selected.every(idx => correctSet.has(idx));
        if(isCorrect) {
            if(userAnswers[currentIndex] === null) userScore++;
            currentFeedback = { correct: true, message: "✅ Correct!" };
        } else {
            const correctAnswersText = q.correctIndices.map(idx => q.options[idx]).join("; ");
            currentFeedback = { correct: false, message: `❌ Incorrect. Correct answer(s): ${correctAnswersText}` };
        }
        userAnswers[currentIndex] = selected;
        renderCurrentQuestion(); // re-render with feedback
        document.getElementById("nextBtn").disabled = false;
        document.getElementById("submitAnswerBtn").disabled = true;
    }

    function goNext() {
        currentIndex++;
        currentFeedback = null;
        if(currentIndex < activeQuestions.length) renderCurrentQuestion();
        else showFinalResult();
    }

    function showFinalResult() {
        const total = activeQuestions.length;
        const finalScore = userScore;
        quizActive = false;
        app.innerHTML = `
            <div class="result-screen">
                <h2>🏆 Quiz Completed</h2>
                <div style="font-size:2rem; margin:1rem 0;">${finalScore} / ${total}</div>
                <p>You got ${finalScore} correct out of ${total} questions.</p>
                <div class="btn-group" style="margin-top:2rem;">
                    <button class="btn btn-primary" id="restartBtn">📋 New Quiz</button>
                    <button class="btn btn-outline" id="homeBtn">🏠 Main Menu</button>
                </div>
            </div>
        `;
        document.getElementById("restartBtn")?.addEventListener("click", () => renderModeSelection());
        document.getElementById("homeBtn")?.addEventListener("click", () => renderModeSelection());
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}

    renderModeSelection();
</script>
</body>
</html>
