<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Quest — Information Retrieval Quiz</title>
<style>
/* ============================================================
   DESIGN SYSTEM — Dark academic / terminal aesthetic
   Palette: deep navy bg, warm amber accent, crisp white text
   Font pairing: Playfair Display (headings) + JetBrains Mono (ui)
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap');

:root {
  --bg:        #0a0e1a;
  --surface:   #111827;
  --card:      #1a2236;
  --border:    #2a3650;
  --amber:     #f59e0b;
  --amber-dim: #92610a;
  --green:     #10b981;
  --red:       #ef4444;
  --text:      #e8eaf0;
  --muted:     #8892a8;
  --radius:    12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Animated grid background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,158,11,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,158,11,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── SCREENS ── */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; }

/* ══════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════ */
#home-screen {
  flex-direction: column;
  align-items: center;
  padding: 60px 20px 40px;
  min-height: 100vh;
}

.logo-badge {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--amber) 0%, #fbbf24 50%, #f59e0b 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -2px;
  line-height: 1;
  animation: fadeDown .6s ease both;
}

.tagline {
  color: var(--muted);
  font-size: .8rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 8px;
  animation: fadeDown .6s .1s ease both;
}

.divider {
  width: 60px;
  height: 2px;
  background: var(--amber);
  margin: 32px auto;
  animation: scaleIn .5s .2s ease both;
}

.chapter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  width: 100%;
  max-width: 920px;
  animation: fadeUp .6s .3s ease both;
}

.chapter-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  cursor: pointer;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.chapter-card::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--amber);
  transform: scaleY(0);
  transition: transform .2s;
  transform-origin: bottom;
}

.chapter-card:hover {
  border-color: var(--amber-dim);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(245,158,11,.12);
}
.chapter-card:hover::after { transform: scaleY(1); }

.ch-num {
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--amber);
  min-width: 36px;
  font-family: 'Playfair Display', serif;
}

.ch-info { flex: 1; }
.ch-title {
  font-size: .82rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.ch-meta {
  font-size: .7rem;
  color: var(--muted);
  margin-top: 3px;
}

.ch-arrow {
  color: var(--border);
  font-size: 1rem;
  transition: color .2s, transform .2s;
}
.chapter-card:hover .ch-arrow {
  color: var(--amber);
  transform: translateX(4px);
}

/* ══════════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════════ */
#quiz-screen {
  flex-direction: column;
  align-items: center;
  padding: 32px 20px;
  min-height: 100vh;
}

.quiz-header {
  width: 100%;
  max-width: 720px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}

.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: .75rem;
  transition: border-color .2s, color .2s;
}
.back-btn:hover { border-color: var(--amber); color: var(--amber); }

.quiz-chapter-label {
  font-size: .75rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  flex: 1;
}

.score-pill {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: .75rem;
  color: var(--amber);
  font-weight: 600;
}

/* Progress bar */
.progress-wrap {
  width: 100%;
  max-width: 720px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 32px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), #fbbf24);
  border-radius: 2px;
  transition: width .4s ease;
}

/* Question card */
.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  width: 100%;
  max-width: 720px;
  animation: fadeUp .3s ease;
}

.q-number {
  font-size: .7rem;
  color: var(--amber);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.q-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 28px;
}

.options-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: .8rem;
  color: var(--text);
  text-align: left;
  transition: border-color .15s, background .15s, transform .1s;
  display: flex;
  align-items: center;
  gap: 12px;
  line-height: 1.4;
}

.option-letter {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem;
  font-weight: 600;
  flex-shrink: 0;
  transition: background .15s, border-color .15s;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--amber-dim);
  background: rgba(245,158,11,.07);
  transform: translateX(4px);
}
.option-btn:hover:not(:disabled) .option-letter {
  border-color: var(--amber);
  color: var(--amber);
}

/* Answer revealed states */
.option-btn.correct {
  border-color: var(--green);
  background: rgba(16,185,129,.1);
}
.option-btn.correct .option-letter {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.option-btn.wrong {
  border-color: var(--red);
  background: rgba(239,68,68,.1);
}
.option-btn.wrong .option-letter {
  background: var(--red);
  border-color: var(--red);
  color: #fff;
}

.option-btn:disabled { cursor: not-allowed; }

.feedback-bar {
  margin-top: 20px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: .78rem;
  display: none;
}
.feedback-bar.show { display: block; }
.feedback-bar.correct-fb { background: rgba(16,185,129,.12); color: var(--green); border: 1px solid rgba(16,185,129,.3); }
.feedback-bar.wrong-fb { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.25); }

.next-btn {
  margin-top: 24px;
  background: var(--amber);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 13px 32px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  display: none;
  transition: background .2s, transform .1s;
  letter-spacing: 1px;
}
.next-btn:hover { background: #fbbf24; transform: translateY(-1px); }
.next-btn.show { display: inline-block; }

/* ══════════════════════════════════════
   RESULTS SCREEN
══════════════════════════════════════ */
#results-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  text-align: center;
}

.result-badge {
  font-family: 'Playfair Display', serif;
  font-size: clamp(4rem, 15vw, 8rem);
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, var(--amber), #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: scaleIn .5s ease both;
}

.result-label {
  font-size: .75rem;
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 8px;
  animation: fadeUp .4s .1s ease both;
}

.result-chapter {
  color: var(--muted);
  font-size: .78rem;
  margin-top: 8px;
  animation: fadeUp .4s .15s ease both;
}

.result-message {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  margin-top: 28px;
  color: var(--text);
  animation: fadeUp .4s .2s ease both;
}

.result-stats {
  display: flex;
  gap: 32px;
  margin-top: 32px;
  animation: fadeUp .4s .25s ease both;
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.stat-val {
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--amber);
}
.stat-lbl { font-size: .7rem; color: var(--muted); }

.result-actions {
  display: flex;
  gap: 12px;
  margin-top: 36px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeUp .4s .3s ease both;
}

.btn-primary {
  background: var(--amber);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 13px 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .1s;
  letter-spacing: 1px;
}
.btn-primary:hover { background: #fbbf24; transform: translateY(-1px); }

.btn-ghost {
  background: none;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem;
  cursor: pointer;
  transition: border-color .2s, color .2s;
  letter-spacing: 1px;
}
.btn-ghost:hover { border-color: var(--amber); color: var(--amber); }

/* ── KEYFRAMES ── */
@keyframes fadeDown { from { opacity:0; transform:translateY(-20px) } to { opacity:1; transform:none } }
@keyframes fadeUp   { from { opacity:0; transform:translateY(20px)  } to { opacity:1; transform:none } }
@keyframes scaleIn  { from { opacity:0; transform:scale(.8)         } to { opacity:1; transform:none } }

/* ── Mobile tweaks ── */
@media (max-width: 600px) {
  .q-card { padding: 20px; }
  .option-btn { font-size: .75rem; }
  .result-stats { gap: 20px; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     HOME SCREEN — Chapter selection menu
════════════════════════════════════════════════ -->
<div id="home-screen" class="screen active">
  <div class="logo-badge">IR Quest</div>
  <p class="tagline">Information Retrieval · NPTEL · 12 Chapters</p>
  <div class="divider"></div>
  <div class="chapter-grid" id="chapterGrid">
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     QUIZ SCREEN — One question at a time
════════════════════════════════════════════════ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <span class="quiz-chapter-label" id="quizChapterLabel"></span>
    <div class="score-pill" id="scorePill">0 / 0</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="q-card" id="qCard">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <ul class="options-list" id="optionsList"></ul>
    <div class="feedback-bar" id="feedbackBar"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     RESULTS SCREEN — Final score display
════════════════════════════════════════════════ -->
<div id="results-screen" class="screen">
  <div class="result-badge" id="resultBadge"></div>
  <div class="result-label">Final Score</div>
  <div class="result-chapter" id="resultChapter"></div>
  <div class="result-message" id="resultMessage"></div>
  <div class="result-stats">
    <div class="stat"><span class="stat-val" id="statCorrect">0</span><span class="stat-lbl">Correct</span></div>
    <div class="stat"><span class="stat-val" id="statWrong">0</span><span class="stat-lbl">Wrong</span></div>
    <div class="stat"><span class="stat-val" id="statPercent">0%</span><span class="stat-lbl">Accuracy</span></div>
  </div>
  <div class="result-actions">
    <button class="btn-primary" onclick="retryChapter()">↺ Retry Chapter</button>
    <button class="btn-ghost"   onclick="goHome()">⌂ All Chapters</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  QUIZ DATA — All 125 questions from NPTEL IR Assignments
//  Structure: { title, questions: [{ q, options, answer }] }
//  answer = index (0-based) of the correct option
// ═══════════════════════════════════════════════════════════════

const CHAPTERS = [

  /* ── Week 1 · Assignment 1 ── */
  {
    title: "IR Basics & Boolean Retrieval",
    questions: [
      {
        q: "What is the primary goal of Information Retrieval (IR)?",
        options: [
          "To structure databases",
          "To seek out unstructured documents that satisfy a user's information need",
          "To perform numerical computations",
          "To design user interfaces"
        ],
        answer: 1
      },
      {
        q: "What does the term stopword refer to in IR?",
        options: [
          "Words that are rare in documents",
          "Words that are always capitalized",
          "Technical terms in a document",
          "Commonly used words that do not contribute significantly to content understanding"
        ],
        answer: 3
      },
      {
        q: "What is the main difference between controlled vocabulary and free-text vocabulary?",
        options: [
          "Controlled vocabulary uses human-assigned topics; free-text uses terms from the document",
          "Controlled vocabulary is cheaper to implement",
          "Free-text vocabulary is more ambiguous",
          "Controlled vocabulary has predefined terms; free-text vocabulary is more flexible and allows any terms"
        ],
        answer: 3
      },
      {
        q: "In query optimization for Boolean retrieval, the best practice is to process terms in:",
        options: [
          "Alphabetical order",
          "Order of increasing document frequency",
          "Order of decreasing document frequency",
          "Randomly"
        ],
        answer: 1
      },
      {
        q: "A key disadvantage of controlled vocabulary is:",
        options: [
          "Too many terms",
          "Cannot be used for indexing",
          "Expensive and time-consuming",
          "Cannot represent topic details"
        ],
        answer: 2
      },
      {
        q: "Ad hoc IR means:",
        options: [
          "Using SQL to retrieve documents",
          "Retrieval done with unlimited queries",
          "Retrieval evaluated using a finite set of queries",
          "No evaluation is needed"
        ],
        answer: 2
      },
      {
        q: "What is a major drawback of using grep-like linear scanning for IR on large collections?",
        options: [
          "It cannot handle Boolean queries",
          "It is efficient for ranked retrieval",
          "It supports proximity queries well",
          "It requires scanning the entire collection for each query term"
        ],
        answer: 3
      },
      {
        q: "Which of the following are stored in the dictionary of an inverted index?",
        options: [
          "The actual term only",
          "Document frequency only",
          "Position of term in each document",
          "The actual term, Document frequency, and Pointer to the start of the posting list"
        ],
        answer: 3
      },
      {
        q: "You have two posting lists T₁ = [3, 10, 24, 40] and T₂ = [1, 10, 15, 24, 35, 40]. How many comparisons occur during a standard AND merge?",
        options: ["6", "7", "8", "9"],
        answer: 1
      },
      {
        q: "Let posting list sizes for words 'A' and 'B' be |A| = 1200 and |B| = 300. What will be the size of A AND B?",
        options: ["36", "1200", "300", "90"],
        answer: 2
      }
    ]
  },

  /* ── Week 2 · Assignment 2 ── */
  {
    title: "Index Construction & Statistical Laws",
    questions: [
      {
        q: "What is document frequency?",
        options: [
          "Number of times a term occurs in a document",
          "Number of documents containing the term",
          "Total occurrences of a term in the corpus",
          "Number of tokens in a document"
        ],
        answer: 1
      },
      {
        q: "Posting lists may store:",
        options: [
          "DocIDs only",
          "Document lengths only",
          "DocIDs, Term frequencies, and Term positions",
          "Document lengths and Term positions only"
        ],
        answer: 2
      },
      {
        q: "Zipf's law relates:",
        options: [
          "Term frequency vs document length",
          "Document rank vs popularity",
          "Posting length vs dictionary size",
          "Term rank vs frequency"
        ],
        answer: 3
      },
      {
        q: "Heaps' law predicts:",
        options: [
          "Vocabulary size as a function of corpus size",
          "Posting list compression ratio",
          "Query popularity distribution",
          "Document frequency growth"
        ],
        answer: 0
      },
      {
        q: "Which dictionary implementation supports prefix/wildcard queries efficiently?",
        options: [
          "Hash-based dictionary",
          "SPIMI dictionary",
          "Sort-based dictionary",
          "Binary heap dictionary"
        ],
        answer: 2
      },
      {
        q: "SPIMI does not require sorting because:",
        options: [
          "It never stores docIDs",
          "It merges lists during query time",
          "It stores tokens unsorted permanently",
          "It keeps posting lists in hash tables directly"
        ],
        answer: 3
      },
      {
        q: "Zipf's law implies that:",
        options: [
          "The vocabulary stops growing eventually",
          "Most words occur rarely, a few words dominate the corpus, and word frequency follows a power law",
          "A few words dominate the corpus only",
          "Word frequency follows a power law only"
        ],
        answer: 1
      },
      {
        q: "Which scenario makes hash-based dictionaries unsuitable?",
        options: [
          "Very large number of terms",
          "Need for range/prefix queries",
          "Need for dynamic updates",
          "Need for faster lookups"
        ],
        answer: 1
      },
      {
        q: "In posting list compression, why is storing gaps between document IDs more efficient than storing the IDs themselves for frequent terms?",
        options: [
          "Gaps are always smaller numbers, requiring fewer bits to encode",
          "Gaps eliminate the need for a dictionary",
          "Gaps allow for lossy compression of the index",
          "Gaps make range queries faster"
        ],
        answer: 0
      },
      {
        q: "According to Zipf's Law with constant c=0.1, approximately what percentage of the text do the top 10 most frequent terms account for?",
        options: ["10%", "20%", "30%", "40%"],
        answer: 2
      }
    ]
  },

  /* ── Week 3 · Assignment 3 ── */
  {
    title: "Lucene & Indexing Fundamentals",
    questions: [
      {
        q: "What is the role of an Analyzer during indexing?",
        options: [
          "It computes relevance scores",
          "It tokenizes and processes text",
          "It stores fields on disk",
          "It merges index segments"
        ],
        answer: 1
      },
      {
        q: "In Lucene, a Document is best described as:",
        options: [
          "A single term in the vocabulary",
          "A query representation",
          "A container for multiple fields",
          "A scoring function"
        ],
        answer: 2
      },
      {
        q: "When adding a Field to a Document, which of the following are legitimate concerns regarding how the field's value is handled?",
        options: [
          "Stored, Indexed, and Tokenized only",
          "Indexed and Typed only",
          "Stored, Indexed, and Tokenized (but not Typed)",
          "Stored, Indexed, Tokenized, and Typed"
        ],
        answer: 0
      },
      {
        q: "For the 'CONTENT' field supporting phrase queries, which IndexOptions setting is needed?",
        options: [
          "TextField",
          "IndexOptions.DOCS",
          "IndexOptions.DOCS_AND_FREQS",
          "IndexOptions.DOCS_AND_FREQS_AND_POSITIONS"
        ],
        answer: 3
      },
      {
        q: "Adding 1000 documents to a new PyLucene index — which are correct and necessary steps?",
        options: [
          "For each document, create a new IndexWriter instance",
          "Use lucene.initVM(), writer.addDocument(doc), and writer.close()",
          "Skip lucene.initVM() if already called once globally",
          "Use writer.commitDocument() instead of addDocument()"
        ],
        answer: 1
      },
      {
        q: "Which of the following design choices help in efficient indexing?",
        options: [
          "Not storing large text fields, Using StringField for categorical data, Choosing appropriate analyzers",
          "Tokenizing numeric fields",
          "Storing all fields for retrieval",
          "Using TextField for IDs"
        ],
        answer: 0
      },
      {
        q: "Which of the following statements about Lucene Documents are correct?",
        options: [
          "A document can have multiple fields with the same name; Documents are immutable once indexed",
          "Field names must be unique per document",
          "Documents directly store posting lists",
          "Documents are always mutable"
        ],
        answer: 0
      },
      {
        q: "Why is it usually inefficient to store large text fields in Lucene?",
        options: [
          "Stored fields affect term statistics",
          "Stored fields increase index size",
          "Stored fields reduce recall",
          "Stored fields cannot be compressed"
        ],
        answer: 1
      },
      {
        q: "Which Lucene field type is most appropriate for document identifiers?",
        options: ["TextField", "StoredField", "StringField", "IntPoint"],
        answer: 2
      },
      {

          "Word2Vec (Skip-gram/CBoW)",
          "GloVe",
          "FastText",
          "BERT sentence embeddings"
        ],
        answer: 3
      }
    ]
  }

]; // end CHAPTERS


// ═══════════════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════════════
let currentChapter = 0;
let currentQuestion = 0;
let score = 0;
let answered = false;

// ═══════════════════════════════════════════════════════════════
//  SCREEN SWITCHING
// ═══════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { showScreen('home-screen'); }

// ═══════════════════════════════════════════════════════════════
//  BUILD HOME SCREEN — inject chapter cards
// ═══════════════════════════════════════════════════════════════
function buildHome() {
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = CHAPTERS.map((ch, i) => `
    <div class="chapter-card" onclick="startChapter(${i})">
      <div class="ch-num">${i + 1}</div>
      <div class="ch-info">
        <div class="ch-title">${ch.title}</div>
        <div class="ch-meta">${ch.questions.length} questions</div>
      </div>
      <div class="ch-arrow">→</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════════
//  START A CHAPTER QUIZ
// ═══════════════════════════════════════════════════════════════
function startChapter(idx) {
  currentChapter = idx;
  currentQuestion = 0;
  score = 0;
  document.getElementById('quizChapterLabel').textContent =
    `Chapter ${idx + 1} / 12`;
  showScreen('quiz-screen');
  renderQuestion();
}

function retryChapter() { startChapter(currentChapter); }

// ═══════════════════════════════════════════════════════════════
//  RENDER CURRENT QUESTION
// ═══════════════════════════════════════════════════════════════
function renderQuestion() {
  const ch = CHAPTERS[currentChapter];
  const q  = ch.questions[currentQuestion];
  const total = ch.questions.length;
  answered = false;

  // Progress bar
  document.getElementById('progressBar').style.width =
    `${(currentQuestion / total) * 100}%`;

  // Score pill
  document.getElementById('scorePill').textContent =
    `${score} / ${currentQuestion}`;

  // Question header
  document.getElementById('qNumber').textContent =
    `Question ${currentQuestion + 1} of ${total}`;
  document.getElementById('qText').textContent = q.q;

  // Options
  const letters = ['A','B','C','D'];
  const list = document.getElementById('optionsList');
  list.innerHTML = q.options.map((opt, i) => `
    <li>
      <button class="option-btn" onclick="selectAnswer(${i})">
        <span class="option-letter">${letters[i]}</span>
        ${opt}
      </button>
    </li>
  `).join('');

  // Hide feedback & next button
  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';
  fb.textContent = '';
  document.getElementById('nextBtn').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════
//  HANDLE ANSWER SELECTION
// ═══════════════════════════════════════════════════════════════
function selectAnswer(chosenIdx) {
  if (answered) return; // prevent double-clicking
  answered = true;

  const q = CHAPTERS[currentChapter].questions[currentQuestion];
  const buttons = document.querySelectorAll('.option-btn');

  // Disable all buttons
  buttons.forEach(b => b.disabled = true);

  if (chosenIdx === q.answer) {
    score++;
    buttons[chosenIdx].classList.add('correct');
    showFeedback(true, '✓ Correct!');
  } else {
    buttons[chosenIdx].classList.add('wrong');
    buttons[q.answer].classList.add('correct');
    showFeedback(false, `✗ Incorrect. Correct answer: ${['A','B','C','D'][q.answer]}. ${q.options[q.answer]}`);
  }

  // Update score pill immediately
  document.getElementById('scorePill').textContent =
    `${score} / ${currentQuestion + 1}`;

  document.getElementById('nextBtn').classList.add('show');
}

function showFeedback(isCorrect, msg) {
  const fb = document.getElementById('feedbackBar');
  fb.textContent = msg;
  fb.className = `feedback-bar show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
}

// ═══════════════════════════════════════════════════════════════
//  NEXT QUESTION OR SHOW RESULTS
// ═══════════════════════════════════════════════════════════════
function nextQuestion() {
  currentQuestion++;
  const total = CHAPTERS[currentChapter].questions.length;

  if (currentQuestion >= total) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ═══════════════════════════════════════════════════════════════
//  SHOW RESULTS SCREEN
// ═══════════════════════════════════════════════════════════════
function showResults() {
  const total = CHAPTERS[currentChapter].questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('resultBadge').textContent   = `${score}/${total}`;
  document.getElementById('resultChapter').textContent =
    `Chapter ${currentChapter + 1}: ${CHAPTERS[currentChapter].title}`;
  document.getElementById('statCorrect').textContent   = score;
  document.getElementById('statWrong').textContent     = total - score;
  document.getElementById('statPercent').textContent   = `${pct}%`;

  // Motivational message based on score
  let msg = '';
  if (pct === 100) msg = 'Perfect Score! Outstanding!';
  else if (pct >= 80) msg = 'Excellent work! Keep it up.';
  else if (pct >= 60) msg = 'Good effort. Review the missed ones.';
  else if (pct >= 40) msg = 'Keep studying — you\'ll get there!';
  else msg = 'Don\'t give up. Practice makes perfect.';

  document.getElementById('resultMessage').textContent = msg;
  showScreen('results-screen');
}

// ═══════════════════════════════════════════════════════════════
//  INITIALISE
// ═══════════════════════════════════════════════════════════════
buildHome();
</script>
</body>
</html>
